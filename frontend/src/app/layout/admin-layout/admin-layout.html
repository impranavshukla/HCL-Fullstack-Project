<div class="admin-layout-wrapper">
  
  <!-- Left Side Navigation -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <div class="logo">
        <span class="icon">🏨</span>
        <span class="text">HotelAdmin</span>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <ul>
        <li>
          <a routerLink="/admin/home" routerLinkActive="active" class="nav-link">
            <span class="nav-icon">📊</span>
            <span class="nav-text">Home</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/hotels" routerLinkActive="active" class="nav-link">
            <span class="nav-icon">🏢</span>
            <span class="nav-text">Hotels</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/rooms" routerLinkActive="active" class="nav-link">
            <span class="nav-icon">🛏️</span>
            <span class="nav-text">Rooms</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/bookings" routerLinkActive="active" class="nav-link">
            <span class="nav-icon">📅</span>
            <span class="nav-text">Bookings</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/guests" routerLinkActive="active" class="nav-link">
            <span class="nav-icon">👥</span>
            <span class="nav-text">Guests</span>
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content Column to the Right -->
  <div class="admin-main-column">
    
    <!-- Top Horizontal Navbar -->
    <header class="admin-topbar">
      <div class="topbar-left">
        <h2 class="welcome-text">Welcome, Admin 👋</h2>
      </div>
      
      <div class="topbar-right">
        <div class="user-profile">
          <img src="https://ui-avatars.com/api/?name=Admin+User&background=4F46E5&color=fff" alt="Profile" class="avatar">
        </div>
        
        <!-- Welcome + Logout in Horizontal Nav -->
        <button class="logout-btn-top" (click)="logout()">
          <span class="icon">🚪</span>
          <span>Logout</span>
        </button>
      </div>
    </header>

    <!-- Main Router View Area -->
    <main class="admin-content-area">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
